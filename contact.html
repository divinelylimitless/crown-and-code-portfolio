<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Crown & Code</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="nav">

  <a href="index.html" class="logo">
    <img src="./images/logo.PNG" alt="Crown & Code Logo">
  </a>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="projects.html">Projects</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </div>

</nav>

<section class="contact-hero">

  <div class="contact-overlay">

    <div class="contact-left">

      <p class="hero-tag">LET’S CREATE SOMETHING BEAUTIFUL</p>

      <h1>Get In Touch</h1>

      <p class="hero-text">
        Ready to create a website for your organisation, programme or brand?
        Send an enquiry and I’ll get back to you.
      </p>

      <a class="btn" href="mailto:crownandcode.studio@gmail.com">
        Email Crown & Code
      </a>

    </div>

    <div class="contact-card">

      <h2>Send an Enquiry</h2>

     <form
  action="https://formspree.io/f/xbdejlnz"
  method="POST"
  class="contact-form">
  <input type="hidden" name="_subject" value="New Crown & Code Website Enquiry">
<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="text"
name="subject"
placeholder="Subject">

<textarea
name="message"
placeholder="Tell me about your project..."
required></textarea>

        <button class="btn" type="submit">
          Send Enquiry
        </button>

      </form>

    </div>

  </div>

</section>

<footer class="footer">
  <p>© 2026 Crown & Code — Built by Alicia Samuels</p>
</footer>

<script src="script.js"></script>

</body>
</html>
