<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Counter App</h1>

<p id="count">0</p>
<p id="message"></p>


    <div class="buttons">
      <button onclick="decreaseCount()">-</button>
      <button onclick="resetCount()">Reset</button>
      <button onclick="increaseCount()">+</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
